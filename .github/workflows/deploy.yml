name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via lftp
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt of 3..."
            lftp -c "
              set net:timeout 30;
              set net:max-retries 5;
              set net:reconnect-interval-base 5;
              set ftp:ssl-force true;
              set ftp:ssl-protect-data true;
              set ftps:initial-prot '';
              set ssl:verify-certificate false;
              open -u '${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}' ftps://${{ secrets.FTP_SERVER }};
              mirror --reverse --parallel=4 --verbose ./dist/ /public_html/;
              quit
            " && echo "Deploy succeeded on attempt $attempt!" && exit 0
            echo "Attempt $attempt failed. Waiting 30 seconds before retry..."
            sleep 30
          done
          echo "All 3 deploy attempts failed."
          exit 1
