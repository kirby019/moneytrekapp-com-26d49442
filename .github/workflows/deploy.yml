name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        timeout-minutes: 8
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt of 3..."
            lftp -c "
              set net:timeout 30;
              set net:max-retries 3;
              set net:reconnect-interval-base 5;
              set ftp:ssl-allow false;
              set ftp:use-mlsd false;
              set ftp:use-mdtm false;
              set ftp:use-size false;
              open -u '${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_SERVER }};
              mirror --reverse --delete --parallel=2 --verbose ./dist/ /public_html/;
              quit
            " && break || { echo "Attempt $attempt failed. Retrying in 15s..."; sleep 15; }
          done
